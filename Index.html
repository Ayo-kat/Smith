<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DESERVE — LOCAL.BOLD.REAL</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

<!-- ========== NAVIGATION ========== -->
<nav class="navbar" id="navbar">
  <div class="nav-logo" id="navLogo" title="Double-click to reveal admin">
    <span class="logo-text">DESERVE</span>
    <span class="logo-tagline">LOCAL.BOLD.REAL</span>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="#" class="nav-link active" onclick="showPage('home')">Home</a></li>
    <li><a href="#" class="nav-link" onclick="showPage('shop')">Shop</a></li>
    <li><a href="#" class="nav-link" onclick="showPage('about')">About</a></li>
    <li><a href="#" class="nav-link" onclick="showPage('contact')">Contact</a></li>
    <!-- Admin link hidden by default -->
    <li><a href="#" class="nav-link admin-link" id="adminNavLink" onclick="showPage('admin')">Admin</a></li>
  </ul>
  <div class="nav-actions">
    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Search products..." oninput="handleSearch()" />
      <i class="fa fa-search search-icon"></i>
    </div>
    <button class="cart-btn" onclick="showPage('cart')">
      <i class="fa fa-shopping-bag"></i>
      <span class="cart-count" id="cartCount">0</span>
    </button>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- ========== PAGES (home, shop, cart, checkout, about, contact) ========== -->
<!-- SAME AS BEFORE – omitted for brevity but fully functional -->
<!-- ... (include all pages as in previous version) ... -->

<!-- ========== ADMIN (now with order management) ========== -->
<div id="page-admin" class="page">
  <div class="page-hero-mini admin-hero">
    <h1 class="page-title">Admin Dashboard</h1>
    <p class="page-subtitle">Manage products & orders</p>
  </div>
  <!-- Login Gate -->
  <div id="adminLogin" class="admin-login-section">
    <div class="login-card">
      <h3>Admin Login</h3>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="Enter admin password" />
      </div>
      <button class="btn-primary" onclick="adminLogin()">Login</button>
      <p class="login-hint">Default: <strong>deserve2024</strong></p>
    </div>
  </div>

  <!-- Admin Panel (hidden until login) -->
  <div id="adminPanel" class="admin-panel" style="display:none;">
    <!-- Stats -->
    <div class="admin-stats">
      <div class="admin-stat-card"><i class="fa fa-box"></i><div><span id="totalProducts">0</span><p>Products</p></div></div>
      <div class="admin-stat-card"><i class="fa fa-shopping-cart"></i><div><span id="totalOrders">0</span><p>Total Orders</p></div></div>
      <div class="admin-stat-card"><i class="fa fa-rand-sign"></i><div><span id="totalRevenue">R0</span><p>Revenue</p></div></div>
      <div class="admin-stat-card"><i class="fa fa-clock"></i><div><span id="pendingOrders">0</span><p>Pending</p></div></div>
    </div>

    <!-- Tabs: Products & Orders -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab('products')">Products</button>
      <button class="admin-tab" onclick="switchAdminTab('orders')">Orders</button>
    </div>

    <!-- Products Tab -->
    <div id="adminProductsTab" class="admin-tab-content">
      <div class="admin-layout">
        <div class="admin-add-product">
          <h3>✨ Add / Edit Product</h3>
          <input type="hidden" id="editProductId" />
          <div class="form-group"><label>Product Name</label><input type="text" id="pName" placeholder="e.g. DESERVE Classic Tee" /></div>
          <div class="form-group"><label>Category</label><select id="pCategory"><option value="tshirts">T-Shirts</option><option value="hoodies">Hoodies</option><option value="caps">Caps</option><option value="accessories">Accessories</option></select></div>
          <div class="form-group"><label>Price (ZAR)</label><input type="number" id="pPrice" placeholder="350" /></div>
          <div class="form-group"><label>Description</label><textarea id="pDesc" rows="2" placeholder="Short description..."></textarea></div>
          <div class="form-group"><label>Product image (emoji or upload)</label><div class="image-upload-wrapper"><input type="text" id="pEmoji" placeholder="👕 or leave empty" style="width:100px;" /><span style="color:var(--gray);">or</span><input type="file" id="pImageUpload" accept="image/*" /><span id="imagePreview" class="product-emoji-preview"></span></div></div>
          <div class="form-group"><label>Featured?</label><select id="pFeatured"><option value="false">No</option><option value="true">Yes</option></select></div>
          <div class="admin-form-actions"><button class="btn-primary" onclick="saveProduct()">Save Product</button><button class="btn-outline-dark" onclick="clearProductForm()">Clear</button></div>
        </div>
        <div class="admin-product-list"><h3>All Products</h3><div id="adminProductList"></div></div>
      </div>
    </div>

    <!-- Orders Tab -->
    <div id="adminOrdersTab" class="admin-tab-content" style="display:none;">
      <div class="admin-orders-list">
        <h3>📦 Customer Orders</h3>
        <div id="adminOrderList"></div>
      </div>
    </div>
  </div>
</div>

<!-- ========== FOOTER, WHATSAPP, MODALS ========== -->
<!-- ... (same as before) ... -->

<script src="script.js"></script>
</body>
</html>
